name: Docker Multi-Arch CI

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  push:
    branches: [main]
    paths:
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no changes detected'
        required: false
        type: choice
        default: 'false'
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  # ── Phase 1: detect whether anything changed ──────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.compare.outputs.should_build }}
      changelog: ${{ steps.compare.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Alpine version
        id: alpine
        run: |
          echo "version=$(docker run --rm alpine:latest cat /etc/alpine-release)" >> "$GITHUB_OUTPUT"

      - name: Get latest Go version
        id: golang
        run: |
          echo "version=$(docker run --rm golang:alpine go version | grep -oP 'go\K[0-9.]+')" >> "$GITHUB_OUTPUT"

      - name: Get telegram-bot-api version from go.mod
        id: tgapi
        run: |
          echo "version=$(grep 'telegram-bot-api' go.mod | awk '{print $NF}')" >> "$GITHUB_OUTPUT"

      - name: Get latest GitHub release tag
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build version string and decide whether to build
        id: compare
        run: |
          ALPINE="${{ steps.alpine.outputs.version }}"
          GO="${{ steps.golang.outputs.version }}"
          TGAPI="${{ steps.tgapi.outputs.version }}"
          FORCE="${{ github.event.inputs.force_build }}"
          TRIGGER="${{ github.event_name }}"

          # Version format: alpine-go-tgapi  e.g. 3.21.3-1.24.2-v5.5.1
          VERSION="${ALPINE}-go${GO}-tgapi${TGAPI}"
          LATEST="${{ steps.latest_release.outputs.tag }}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          CHANGELOG=""
          if [[ "$TRIGGER" == "push" ]]; then
            CHANGELOG="🔧 Cambios en el código fuente"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "v${VERSION}" != "$LATEST" || "$FORCE" == "true" ]]; then
            # Detect what changed
            if [[ "$LATEST" != *"${ALPINE}"* ]]; then
              CHANGELOG="🏔️ Alpine Linux actualizado a ${ALPINE}"
            fi
            if [[ "$LATEST" != *"go${GO}"* ]]; then
              CHANGELOG="${CHANGELOG}\n🐹 Go actualizado a ${GO}"
            fi
            if [[ "$LATEST" != *"tgapi${TGAPI}"* ]]; then
              CHANGELOG="${CHANGELOG}\n📡 telegram-bot-api actualizado a ${TGAPI}"
            fi
            [[ -z "$CHANGELOG" ]] && CHANGELOG="🔄 Build forzado"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION | Latest: $LATEST | Build: $(cat $GITHUB_OUTPUT | grep should_build | tail -1)"

      - name: Set final version output
        id: version
        run: echo "version=${{ steps.compare.outputs.version }}" >> "$GITHUB_OUTPUT"

  # ── Phase 2: build per-arch on native runners ─────────────────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=yoniergomez/botainer,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Phase 3: merge into multi-arch manifest ───────────────────────────────────
  build-and-push:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx imagetools create \
            -t yoniergomez/botainer:latest \
            -t yoniergomez/botainer:${VERSION} \
            $(printf 'yoniergomez/botainer@sha256:%s ' $(ls /tmp/digests))

  # ── Phase 4: GitHub Release ───────────────────────────────────────────────────
  release:
    needs: [check-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v${VERSION}"
          CHANGELOG="${{ needs.check-version.outputs.changelog }}"

          # Skip if release already exists
          gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null && exit 0

          cat > /tmp/release-notes.md << NOTES
          ## Botainer \`${VERSION}\`

          ### Qué cambió
          ${CHANGELOG}

          ### Imágenes Docker
          \`\`\`bash
          docker pull yoniergomez/botainer:latest
          docker pull yoniergomez/botainer:${VERSION}
          \`\`\`

          ### Arquitecturas
          | Arquitectura | Tag |
          |---|---|
          | linux/amd64 | \`latest\`, \`${VERSION}\` |
          | linux/arm64 | \`latest\`, \`${VERSION}\` |

          ### Inicio rápido
          \`\`\`bash
          docker run -d --name botainer \\
            -e TELEGRAM_BOT_TOKEN="tu_token" \\
            -v /var/run/docker.sock:/var/run/docker.sock \\
            yoniergomez/botainer
          \`\`\`
          NOTES

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Botainer ${VERSION}" \
            --notes-file /tmp/release-notes.md
