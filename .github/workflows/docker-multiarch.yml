name: Docker Multi-Arch CI

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  push:
    branches: [main]
    paths:
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no changes detected'
        required: false
        type: choice
        default: 'false'
        options: ['true', 'false']

permissions:
  contents: write
  packages: write   # required for ghcr.io

jobs:
  # ── Phase 1: detect whether anything changed ──────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.compare.outputs.should_build }}
      changelog: ${{ steps.compare.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Get app version from code
        id: app_version
        run: |
          VERSION=$(grep 'botVersion.*=' main.go | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Get latest Alpine version
        id: alpine
        run: |
          echo "version=$(docker run --rm alpine:latest cat /etc/alpine-release)" >> "$GITHUB_OUTPUT"

      - name: Get latest Go version
        id: golang
        run: |
          echo "version=$(docker run --rm golang:alpine go version | grep -oP 'go\K[0-9.]+')" >> "$GITHUB_OUTPUT"

      - name: Get telegram-bot-api version from go.mod
        id: tgapi
        run: |
          echo "version=$(grep 'telegram-bot-api' go.mod | awk '{print $NF}')" >> "$GITHUB_OUTPUT"

      - name: Get latest GitHub release tag
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build version string and decide whether to build
        id: compare
        run: |
          APP_VERSION="${{ steps.app_version.outputs.version }}"
          ALPINE="${{ steps.alpine.outputs.version }}"
          GO="${{ steps.golang.outputs.version }}"
          TGAPI="${{ steps.tgapi.outputs.version }}"
          FORCE="${{ github.event.inputs.force_build }}"
          TRIGGER="${{ github.event_name }}"

          # Use app version as main version
          VERSION="${APP_VERSION}"
          LATEST="${{ steps.latest_release.outputs.tag }}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          CHANGELOG=""
          if [[ "$TRIGGER" == "push" ]]; then
            CHANGELOG="🔧 Code changes in main.go"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "v${VERSION}" != "$LATEST" || "$FORCE" == "true" ]]; then
            # Check what changed
            if [[ "$LATEST" != "v${VERSION}" ]]; then
              CHANGELOG="🚀 New version ${VERSION}"
            fi
            if [[ "$LATEST" != *"${ALPINE}"* ]]; then
              CHANGELOG="${CHANGELOG}\n🏔️ Alpine Linux ${ALPINE}"
            fi
            if [[ "$LATEST" != *"go${GO}"* ]]; then
              CHANGELOG="${CHANGELOG}\n🐹 Go ${GO}"
            fi
            if [[ "$LATEST" != *"tgapi${TGAPI}"* ]]; then
              CHANGELOG="${CHANGELOG}\n📡 telegram-bot-api ${TGAPI}"
            fi
            [[ -z "$CHANGELOG" ]] && CHANGELOG="🔄 Forced build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION | Latest: $LATEST | Build: $(cat $GITHUB_OUTPUT | grep should_build | tail -1)"

      - name: Set final version output
        id: version
        run: echo "version=${{ steps.compare.outputs.version }}" >> "$GITHUB_OUTPUT"

  # ── Phase 2: build per-arch on native runners ─────────────────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to Docker Hub by digest
        id: build-dockerhub
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=yoniergomez/botainer,push-by-digest=true,name-canonical=true,push=true

      - name: Build and push to GHCR by digest
        id: build-ghcr
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=ghcr.io/yoniergomez/botainer,push-by-digest=true,name-canonical=true,push=true

      - name: Export digests
        run: |
          mkdir -p /tmp/digests/dockerhub /tmp/digests/ghcr
          touch "/tmp/digests/dockerhub/${DIGEST_DH#sha256:}"
          touch "/tmp/digests/ghcr/${DIGEST_GHCR#sha256:}"
        env:
          DIGEST_DH: ${{ steps.build-dockerhub.outputs.digest }}
          DIGEST_GHCR: ${{ steps.build-ghcr.outputs.digest }}

      - name: Upload digests
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/**
          if-no-files-found: error
          retention-days: 1

  # ── Phase 3: merge into multi-arch manifests ──────────────────────────────────
  build-and-push:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest — Docker Hub
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx imagetools create \
            -t yoniergomez/botainer:latest \
            -t yoniergomez/botainer:${VERSION} \
            $(printf 'yoniergomez/botainer@sha256:%s ' $(ls /tmp/digests/dockerhub))

      - name: Create and push multi-arch manifest — GHCR
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx imagetools create \
            -t ghcr.io/yoniergomez/botainer:latest \
            -t ghcr.io/yoniergomez/botainer:${VERSION} \
            $(printf 'ghcr.io/yoniergomez/botainer@sha256:%s ' $(ls /tmp/digests/ghcr))

  # ── Phase 4: GitHub Release ───────────────────────────────────────────────────
  release:
    needs: [check-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v${VERSION}"
          CHANGELOG="${{ needs.check-version.outputs.changelog }}"

          # Skip if release already exists
          gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null && exit 0

          cat > /tmp/release-notes.md << NOTES
          ## Botainer \`${VERSION}\`

          ### What changed
          ${CHANGELOG}

          ### Docker Images

          **Docker Hub**
          \`\`\`bash
          docker pull yoniergomez/botainer:latest
          docker pull yoniergomez/botainer:${VERSION}
          \`\`\`

          **GitHub Container Registry**
          \`\`\`bash
          docker pull ghcr.io/yoniergomez/botainer:latest
          docker pull ghcr.io/yoniergomez/botainer:${VERSION}
          \`\`\`

          ### Architectures
          | Architecture | Tag |
          |---|---|
          | linux/amd64 | \`latest\`, \`${VERSION}\` |
          | linux/arm64 | \`latest\`, \`${VERSION}\` |

          ### Quick start
          \`\`\`bash
          docker run -d --name botainer \\
            -e TELEGRAM_BOT_TOKEN="your_token" \\
            -v /var/run/docker.sock:/var/run/docker.sock \\
            ghcr.io/yoniergomez/botainer
          \`\`\`
          NOTES

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Botainer ${VERSION}" \
            --notes-file /tmp/release-notes.md

      - name: Send Telegram notification to channel
        if: success()
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          CHANGELOG="${{ needs.check-version.outputs.changelog }}"
          
          # Format changelog for Telegram (replace \n with %0A)
          CHANGELOG_FORMATTED=$(echo "$CHANGELOG" | sed 's/\\n/%0A/g' | sed 's/\n/%0A/g')
          
          # Build descriptive message
          MESSAGE="🚀 *Nueva versión de Botainer disponible*%0A%0A"
          MESSAGE="${MESSAGE}📦 *Versión:* \`${VERSION}\`%0A%0A"
          MESSAGE="${MESSAGE}✨ *Novedades:*%0A${CHANGELOG_FORMATTED}%0A%0A"
          MESSAGE="${MESSAGE}🐳 *Actualizar:*%0A\`docker pull yoniergomez/botainer:latest\`%0A\`docker pull ghcr.io/yoniergomez/botainer:latest\`%0A\`docker compose up -d --build botainer\`%0A%0A"
          MESSAGE="${MESSAGE}🔗 [Ver release completo](https://github.com/YonierGomez/botainer/releases/latest)"
          
          # Send to Telegram channel
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="$MESSAGE"
