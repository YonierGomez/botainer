#EJECUTAR CON $ docker compose -p work_pro -d
#EJECUTAR CON $ docker compose -p work_pro ps
#EJECUTAR CON $ docker compose -p work_pro restart
#EJECUTAR CON $ docker compose -p work_pro pull && docker compose -p work_pro up -d

services:  
  #DESCARGA TORRENTS
  torrent:
    container_name: torrent
    image: lscr.io/linuxserver/qbittorrent
    env_file:
      - common_files/.env
    ports:
      - 8090:8090
      - 6881:6881
      - 6881:6881/udp
    volumes:
      - torrentsConfigFiles:/config
      - torrentsFiles:/torrents
      - downloadsFiles:/downloads
      - seriesFiles:/tv
      - moviesFiles:/movies
    restart: unless-stopped
    networks:
      - net_local

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    ports:
      - 8989:8989
    volumes:
      - sonarrConfig:/config
      - downloadsFiles:/downloads
      - seriesFiles:/tv
    restart: unless-stopped
    networks:
      - net_local

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    ports:
      - 7878:7878
    volumes:
      - radarrConfig:/config
      - downloadsFiles:/downloads
      - moviesFiles:/movies
    restart: unless-stopped
    networks:
      - net_local

  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    ports:
      - 9696:9696
    volumes:
      - prowlarrConfig:/config
      - downloadsFiles:/downloads
    restart: unless-stopped
    networks:
      - net_local

  jackett:
    container_name: jackett
    image: lscr.io/linuxserver/jackett:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    ports:
      - 9117:9117
    volumes:
      - jackettConfig:/config
      - downloadsFiles:/downloads
    restart: unless-stopped
    networks:
      - net_local

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=info
    ports:
      - 8191:8191
    restart: unless-stopped
    networks:
      - net_local

  #MEDIA SERVER PLEX
  plexServer:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    depends_on:
      - torrent
    #env_file:
      #- common_files/.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - VERSION=docker
    volumes:
      - plexConfig:/config
      - downloadsFiles:/movies
      # - /opt/data_movie/peliculas:/peliculas
    restart: unless-stopped

  #WEB SERVER EMBY
  emby:
    container_name: emby
    image: emby/embyserver_arm64v8
    depends_on:
      - torrent
    env_file:
      - common_files/.env
    volumes:
      - embyMetadata:/var/lib/emby/
      - downloadsFiles:/multimedia
      # - /opt/data_movie/peliculas:/peliculas
    restart: unless-stopped
    network_mode: host
 
  #WEB SERVER JELLYFIN
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    env_file:
      - common_files/.env-owncloud
    volumes:
      - jellyfinConfig:/config
        #- downloadsFiles:/data/tvshows
      - downloadsFiles:/data/movies
    #network_mode: host
    ports:
      - 8099:8096
      - 8920:8920 #optional
        #- 7359:7359/udp #optional
        #- 1900:1900/udp #optional
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx
    ports:
      - "80:80"
    volumes:
      - $PWD/common_files/nginx/:/etc/nginx/conf.d/
    restart: unless-stopped
    networks:
      net_local:

  #STORE PRIVADO
  samba:
    image: neytor/samba
    container_name: samba
      #ports: ['445:445', '137:137/udp', '138:138/udp', '139:139/tcp']
    network_mode: "host"
    env_file:
      - common_files/.env-samba
    volumes:
      - downloadsFiles:/download
      - sambaWorkFiles:/work
      - /opt/books:/books
    restart: unless-stopped
    #networks:
      #net_local:
  
  #DB for Nextcloud (PostgreSQL 18+, path-layout for PG 18)
  postgresnextcloud:
    image: postgres:alpine
    container_name: postgresnextcloud
    restart: unless-stopped
    env_file:
      - common_files/.env-postgresnextcloud
    volumes:
      - nextcloudDbData:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U nextcloud -d nextcloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      net_local:

  #NEXTCLOUD
  nextcloud:
    container_name: nextcloud
    image: nextcloud
    ports:
      - 8097:80
    env_file:
      - common_files/.env-nextcloud
    volumes:
      - nextcloudFiles:/var/www/html
    depends_on:
      postgresnextcloud:
        condition: service_healthy
    networks:
      - net_local
    restart: unless-stopped
  
  #NEWS TELEGRAM
  report_news:
    image: neytor/report_news
    container_name: report_news
    restart: always
    env_file:
      - common_files/.env
    networks:
      net_local:

  discount_notify:
    image: yoniergomez/discount-notify
    container_name: discount_notify
    restart: always
    env_file:
      - common_files/.env-discount_notify
    volumes:
      - discountData:/app/data
    networks:
      net_local:

  #UPDATE-DNS
  cloudflare-ddns-updater:
    image: neytor/cloudflare-ddns-updater
    container_name: cloudflare-ddns-updater_container
    restart: always
    env_file:
      - common_files/.env-cloudflare
    networks:
      net_local:

  #DNS PUBLICIDAD OFF
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8092:80/tcp"
    cap_add:
      - NET_ADMIN
    environment:
      DNSMASQ_LISTENING: all
    env_file:
      - common_files/.env-pihole
    volumes:
      - 'piholeData:/etc/pihole'
      - 'piholeData.d:/etc/dnsmasq.d'
    networks:
      net_local:
        ipv4_address: 172.30.0.30
    restart: unless-stopped

  #CONTENEDORES
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    ports:
      - "8093:9000"
    env_file:
      - 'common_files/.env'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'portainerData:/data'
    networks:
      - net_local
    restart: unless-stopped

  #VPN WIREGUARD
  wireguard:
    container_name: wireguard
    image: ghcr.io/wg-easy/wg-easy
    env_file:
      - 'common_files/.wireguard'
    volumes:
      - ~/.wg-easy:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      net_local:
        ipv4_address: 172.30.0.31
    restart: unless-stopped

  #DASHBOARD
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - heimdall:/config
      - '/var/run/docker.sock:/var/run/docker.sock'
    ports:
      - 8094:80
      - 7443:443
    networks:
      - net_local
    restart: unless-stopped

  #BOT TELEGRAM UPDATE
  docker-controller-bot:
    container_name: botdockerserver
    image: dgongut/docker-controller-bot:latest
    env_file:
      - common_files/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # NO CAMBIAR
      - botShedule:/app/schedule # CAMBIAR LA PARTE IZQUIERDA
    restart: unless-stopped
    network_mode: host
    tty: true

  #BOOK KAVITA
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    env_file:
      - common_files/.env
    volumes:
      - kavitaAppdata:/config
      - /opt/books:/books
    ports:
      - 8095:5000
    restart: unless-stopped
    networks:
      - net_local

  #MONITOREO
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./common_files/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - net_local

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./common_files/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - net_local

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8100:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - net_local

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - net_local

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - net_local

  pairdrop:
    image: lscr.io/linuxserver/pairdrop:latest
    container_name: pairdrop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - RATE_LIMIT=false #optional
      - WS_FALLBACK=false #optional
      - RTC_CONFIG= #optional
      - DEBUG_MODE=false #optional
    ports:
      - 8101:3000
    restart: unless-stopped
    networks:
      - net_local

  postgresn8n:
    image: postgres:alpine
    container_name: postgresn8n
    restart: unless-stopped
    env_file:
      - common_files/.env-postgresn8n
    volumes:
      - n8nDbData:/var/lib/postgresql
      - ./common_files/init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U neytor -d n8n']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - net_local

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    container_name: n8n
    env_file:
      - common_files/.env
      - common_files/.env-n8n
    ports:
      - 5678:5678
    links:
      - postgresn8n
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - net_local
    depends_on:
      postgresn8n:
        condition: service_healthy

  #WIKI.JS
  postgreswikijs:
    image: postgres:alpine  # pinned to latest (PG 18+)
    container_name: postgreswikijs
    restart: unless-stopped
    env_file:
      - common_files/.env-postgreswikijs
    volumes:
      - wikijsDbData:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U wikijs -d wiki']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - net_local

  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: wikijs
    restart: unless-stopped
    env_file:
      - common_files/.env-wikijs
    ports:
      - "8103:3000"
    links:
      - postgreswikijs
    networks:
      - net_local
    depends_on:
      postgreswikijs:
        condition: service_healthy

  ailocker:
    image: yoniergomez/ai-locker:latest
    container_name: ailocker
    restart: unless-stopped
    volumes:
      - aiLockerData:/data
    env_file:
    - common_files/.env-ailocker
    ports: ["9091:3001"]
    networks:
      - net_local

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - hommarAppData:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY=a62108841806714be08975c6de1a4b16208e0fedeba727f2a262feee455cda5d
    ports:
      - '7575:7575'
    networks:
      - net_local

# Crear red
networks:
  net_local:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

# Crear vol
volumes:
  piholeData: #VOL PIPEHOLE
  piholeData.d: #VOL PIPEHOLE
  portainerData: #VOL PORTAINER
  torrentsConfigFiles: #VOL TORRENT
  torrentsFiles: #VOL TORRENT
  downloadsFiles: #VOL EMBY Y TORRENT
  sambaWorkFiles: #SAMBA
  embyMetadata: #VOL EMBY
  plexConfig: #VOL PLEX
  nextcloudDbData: #VOL DB
  heimdall: #DASHBOARD
  botShedule: #BOT TELEGRAM SCHEDULE
  kavitaAppdata: #KAVITA READ BOOK
  nextcloudFiles: #VOL NEXTCLOUD
  proxyReverseData: #VOL PROXY
  jellyfinConfig: #VOL JELLYFIN
  grafana-data: #VOL MONITOREO GRAFANA
  sonarrConfig:
  seriesFiles:
  jackettConfig:
  moviesFiles:
  radarrConfig:
  prowlarrConfig:
  booksLibrary:
  n8n_storage:
  wikijsDbData: #VOL WIKI.JS POSTGRES
  aiLockerData: #VOL AI 
  discountData: #Vol discount notify
  n8nDbData: #VOL N8N POSTGRES
  hommarAppData: #VOL HOMAMAR